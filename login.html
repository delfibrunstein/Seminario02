<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TrazaEduca - Login</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Inter', sans-serif;
      background:#F5F5F8;
      height:100vh;
      overflow:hidden;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
      color:#161828;
    }

    .container{
      width:100%;
      max-width:1400px;
      height:92vh;
      background:white;
      border-radius:28px;
      overflow:hidden;
      display:flex;
      box-shadow:0 10px 40px rgba(0,0,0,0.05);
    }

    /* LEFT */

    .left{
      width:55%;
      padding:40px 55px;
      background:#FCFCFF;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
    }

    .logo{
      display:flex;
      align-items:center;
      gap:12px;
    }

    .logo-icon{
      width:52px;
      height:52px;
      border-radius:18px;
      background:#E8F7D9;
      display:flex;
      justify-content:center;
      align-items:center;
      font-size:24px;
    }

    .logo h1{
      font-size:40px;
      font-weight:800;
    }

    .logo span{
      color:#78C043;
    }

    .subtitle{
      color:#777C91;
      font-size:15px;
      margin-top:2px;
    }

    .hero{
      margin-top:20px;
    }

    .hero h2{
      font-size:56px;
      line-height:1.05;
      font-weight:800;
      margin-bottom:24px;
    }

    .hero h2 span{
      color:#8ACD50;
    }

    .hero p{
      font-size:20px;
      line-height:1.5;
      color:#6E7387;
      max-width:600px;
    }

    .illustration{
      display:flex;
      justify-content:center;
      align-items:center;
      margin-top:20px;
    }

    .illustration img{
      max-width:550px;
    }

    /* RIGHT */

    .right{
      width:45%;
      padding:40px;
      display:flex;
      justify-content:center;
      align-items:center;
      background:white;
    }

    .login-card{
      width:100%;
      max-width:500px;
      border:1px solid #ECECF2;
      border-radius:28px;
      padding:36px;
      box-shadow:0 8px 30px rgba(0,0,0,0.03);
    }

    .login-header{
      text-align:center;
      margin-bottom:28px;
    }

    .login-icon{
      width:82px;
      height:82px;
      border-radius:50%;
      background:#F2F8E9;
      display:flex;
      justify-content:center;
      align-items:center;
      font-size:36px;
      margin:0 auto 20px;
    }

    .login-header h3{
      font-size:32px;
      margin-bottom:8px;
    }

    .login-header p{
      color:#7A7F94;
      font-size:17px;
    }

    .form-group{
      margin-bottom:20px;
    }

    .form-group label{
      display:block;
      margin-bottom:8px;
      font-weight:600;
      font-size:15px;
    }

    .input{
      width:100%;
      height:56px;
      border-radius:16px;
      border:1px solid #E4E5EE;
      background:#FAFAFC;
      padding:0 18px;
      font-size:15px;
      outline:none;
      transition:0.2s;
    }

    .input:focus{
      border-color:#8ACD50;
      background:white;
    }

    .extra{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:24px;
      font-size:14px;
    }

    .remember{
      display:flex;
      align-items:center;
      gap:8px;
      color:#6E7387;
    }

    .extra a{
      text-decoration:none;
      color:#7E69FF;
      font-weight:500;
    }

    .btn{
      width:100%;
      height:56px;
      border:none;
      border-radius:16px;
      background:#171B2D;
      color:white;
      font-size:17px;
      font-weight:600;
      cursor:pointer;
      transition:0.2s;
    }

    .btn:hover{
      opacity:0.94;
    }

    .role-box{
      margin-top:18px;
      background:#F3F9EB;
      border-radius:16px;
      padding:16px 18px;
      color:#6B7280;
      font-size:15px;
    }

    .role-box strong{
      color:#7FBF46;
    }

    .register{
      margin-top:28px;
      text-align:center;
      color:#777C91;
      font-size:15px;
    }

    .register a{
      color:#7E69FF;
      text-decoration:none;
      font-weight:700;
      margin-left:5px;
    }

    /* RESPONSIVE */

    @media(max-width:1100px){

      body{
        overflow:auto;
        height:auto;
      }

      .container{
        flex-direction:column;
        height:auto;
      }

      .left,
      .right{
        width:100%;
      }

      .hero h2{
        font-size:42px;
      }

      .hero p{
        font-size:18px;
      }

      .illustration img{
        width:65%;
      }

    }

  </style>

</head>

<body>

  <div class="container">

    <!-- LEFT -->

    <div class="left">

      <div>

        <div class="logo">

          <div class="logo-icon">
            ✦
          </div>

          <div>
            <h1><span>traza</span>educa</h1>
            <p class="subtitle">IA que enseña, vos guiás.</p>
          </div>

        </div>

        <div class="hero">

          <h2>
            Tu aula,<br>
            potenciada con <span>IA.</span>
          </h2>

          <p>
            Planificá, evaluá y acompañá a tus estudiantes
            con herramientas inteligentes y simples.
          </p>

        </div>

      </div>

      <div class="illustration">

        <img 
          src=assets/estudentLogin.png
          alt="Student"
        >

      </div>

    </div>

    <!-- RIGHT -->

    <div class="right">

      <div class="login-card">

        <div class="login-header">

          <div class="login-icon">
            🎓
          </div>

          <h3>¡Bienvenido!</h3>

          <p>
            Iniciá sesión para continuar
          </p>

        </div>

        <form>

          <div class="form-group">

            <label>Email</label>

            <input 
              type="email"
              class="input"
              placeholder="tu@email.com"
            >

          </div>

          <div class="form-group">

            <label>Contraseña</label>

            <input 
              type="password"
              class="input"
              placeholder="••••••••"
            >

          </div>

          <div class="extra">

            <div class="remember">
              <input type="checkbox">
              Recordarme
            </div>

            <a href="#">
              ¿Olvidaste tu contraseña?
            </a>

          </div>

          <button class="btn">
            Ingresar
          </button>

          <div class="role-box">
            Rol detectado:
            <strong>Estudiante</strong>
          </div>

          <div class="register">
            ¿No tenés cuenta?
            <a href="#">
              Registrate
            </a>
          </div>

        </form>

      </div>

    </div>

  </div>

</body>
</html>
